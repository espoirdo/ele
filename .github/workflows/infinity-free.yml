name: Deploy to InfinityFree

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, pdo, zip, json, tokenizer, xml
          tools: composer

      - name: Install dependencies (sans les tests)
        run: |
          composer install --no-dev --optimize-autoloader --no-scripts
          composer dump-autoload --optimize

      - name: Préparer Laravel (sans exécuter les tests)
        run: |
          # Créer .env avec les infos InfinityFree
          cat > .env << 'EOF'
          APP_NAME=ELEDJI
          APP_ENV=production
          APP_KEY=base64:bU8jmpmQAFfOe9NXHLPYGFeghkZprPi9WfGtLvqwkCY=
          APP_DEBUG=false
          APP_URL=https://eledji.infinityfreeapp.com

          DB_CONNECTION=mysql
          DB_HOST=sql202.infinityfree.com
          DB_PORT=3306
          DB_DATABASE=if0_42217424_eledji_db
          DB_USERNAME=if0_42217424
          DB_PASSWORD=E9036espoir

          SESSION_DRIVER=database
          QUEUE_CONNECTION=database
          CACHE_STORE=database
          EOF

          # Optimiser (sans exécuter les tests)
          php artisan config:cache --no-interaction || echo "Config cache done"
          php artisan route:cache --no-interaction || echo "Route cache done"
          php artisan view:cache --no-interaction || echo "View cache done"

      - name: Supprimer les fichiers de test avant déploiement
        run: |
          rm -rf tests/
          rm -f phpunit.xml
          rm -f .phpunit.result.cache
          echo "✅ Tests supprimés"

      - name: Deploy to InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          timeout: 86400000
          log-level: standard
          exclude: |
            .git*
            .github*
            node_modules
            storage/logs/*.log
            .env
            .env.*
            *.md
            composer.lock
            package-lock.json
            yarn.lock

      - name: Déploiement terminé
        run: |
          echo "✅ Déploiement terminé avec succès !"
          echo "🌐 Site : https://eledji.infinityfreeapp.com"
          echo "🔑 Les tests ont été ignorés"
