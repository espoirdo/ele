name: Deploy to InfinityFree

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, pdo, pdo_sqlite, zip, json, tokenizer, xml
          tools: composer

      - name: Install all dependencies (including dev for tests)
        run: |
          composer install --optimize-autoloader

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies and build
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: |
          php artisan config:clear --ansi
          php vendor/bin/phpunit --no-coverage

      - name: Prepare Laravel
        run: |
          # Créer .env avec les infos InfinityFree
          cat > .env << 'EOF'
          APP_NAME=ELEDJI
          APP_ENV=production
          APP_KEY=base64:bU8jmpmQAFfOe9NXHLPYGFeghkZprPi9WfGtLvqwkCY=
          APP_DEBUG=false
          APP_URL=https://eledji.infinityfreeapp.com

          DB_CONNECTION=mysql
          DB_HOST=sql202.infinityfree.com
          DB_PORT=3306
          DB_DATABASE=if0_42217424_eledji_db
          DB_USERNAME=if0_42217424
          DB_PASSWORD=E9036espoir

          SESSION_DRIVER=database
          QUEUE_CONNECTION=database
          CACHE_STORE=database
          EOF

          # Optimiser
          php artisan config:cache --no-interaction || echo "Config cache done"
          php artisan route:cache --no-interaction || echo "Route cache done"
          php artisan view:cache --no-interaction || echo "View cache done"

      - name: Remove dev dependencies and node_modules before deployment
        run: |
          composer remove --dev --no-interaction --no-scripts 2>/dev/null || true
          rm -rf tests/
          rm -rf node_modules/
          rm -f phpunit.xml
          rm -f .phpunit.result.cache
          rm -f package-lock.json
          rm -f .phpunit.result.cache
          rm -rf vendor/fakerphp/faker 2>/dev/null || true
          echo "✅ Tests, node_modules et dev dependencies supprimés"

      - name: Deploy to InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          timeout: 86400000
          log-level: standard
          exclude: |
            .git*
            .github*
            node_modules
            storage/logs/*.log
            .env
            .env.*
            *.md
            composer.lock
            package-lock.json
            yarn.lock

      - name: Déploiement terminé
        run: |
          echo "✅ Déploiement terminé avec succès !"
          echo "🌐 Site : https://eledji.infinityfreeapp.com"